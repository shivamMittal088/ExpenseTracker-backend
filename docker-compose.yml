services:
  mongo:
    image: mongo:7
    container_name: expense-tracker-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: expense-tracker-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: shivammittal088/expense-tracker:backend-latest
    container_name: expense-tracker-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 5000
      NODE_ENV: production
      FRONTEND_ORIGIN: http://localhost:5173
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/expense_tracker}
      REDIS_URL: redis://redis:6379
      AXIOM_TOKEN: ${AXIOM_TOKEN:-}
      AXIOM_ORG_ID: ${AXIOM_ORG_ID:-}
      AXIOM_DATASET: ${AXIOM_DATASET:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    ports:
      - "5000:5000"

  frontend:
    image: shivammittal088/expense-tracker:frontend-latest
    container_name: expense-tracker-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mongo_data:
  redis_data:
